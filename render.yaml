# Деплой на Render: https://render.com
# New → Blueprint → подключить репозиторий с этим файлом
# Или: New → Web Service → указать команды вручную (см. README)

services:
  - type: web
    name: forum-semiya
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_DIR
        value: /opt/render/project/src/data
      - key: GIGACHAT_CLIENT_ID
        sync: false
      - key: GIGACHAT_SECRET_KEY
        sync: false
      - key: GIGACHAT_SCOPE
        value: GIGACHAT_API_B2B
      - key: GIGACHAT_MODEL
        value: GigaChat
