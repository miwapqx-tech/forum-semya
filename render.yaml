services:
  - type: web
    name: forum-family
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_DIR
        value: /var/data
      - key: GIGACHAT_CLIENT_ID
        sync: false
      - key: GIGACHAT_SECRET_KEY
        sync: false
    disk:
      name: forum-data
      mountPath: /var/data
      sizeGB: 1